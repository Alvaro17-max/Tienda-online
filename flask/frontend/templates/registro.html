{% extends "base.html" %}

{% block title %}Registro{% endblock %}

{% block content %}
    <section class="registro">
        <div class="registroForm">
            <h2>Registro de usuario</h2>
            <form action="http://localhost:5001/api/registrar" method="POST">
                <label for="dni">DNI:</label>
                <input type="text" id="dni" name="dni" placeholder="Escribe tu DNI" required>

                <label for="nombre">Nombre(s):</label>
                <input type="text" id="nombre" name="nombre" placeholder="Escribe tu nombre" required>

                <label for="apellido">Apellido(s):</label>
                <input type="text" id="apellido" name="apellido" placeholder="Escribe tus apellidos" required>


                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Escribe tu email" required>

                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" placeholder="Escribe tu contraseña" required>

                <button type="submit">Registrarse</button>
            </form>
        </div>
    </section>
{% endblock %}
